name: Deploy to Alibaba Cloud OSS

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: prod
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install ossutil
        run: |
          curl -o ossutil https://gosspublic.alicdn.com/ossutil/v2/2.0.3/ossutil-2.0.3-linux-amd64.zip
          unzip ossutil-2.0.3-linux-amd64.zip
          chmod +x ossutil-2.0.3-linux-amd64/ossutil
          sudo mv ossutil-2.0.3-linux-amd64/ossutil /usr/local/bin/

      - name: Configure ossutil
        run: |
          ossutil config set --access-key-id ${{ secrets.OSS_ACCESS_KEY_ID }} --access-key-secret ${{ secrets.OSS_ACCESS_KEY_SECRET }} --region ${{ secrets.OSS_REGION }}

      - name: Delete existing files on OSS
        run: |
          ossutil rm oss://${{ secrets.OSS_BUCKET }}/ --recursive --force

      - name: Deploy to Alibaba Cloud OSS
        run: |
          ossutil cp ./dist/ oss://${{ secrets.OSS_BUCKET }}/ --recursive
