name: Update skills catalog

on:
  schedule:
    - cron: '20 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skills-catalog-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh GitHub signals
        run: npm run update:skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate production build
        run: npm run build

      - name: Commit catalog changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh skills catalog'
          file_pattern: src/data/skills.json
